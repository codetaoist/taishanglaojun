# API Gateway Simple Configuration (without Redis)

# жњЌеЉЎе™Ёй…ЌзЅ?server:
  host: "0.0.0.0"
  port: 8081
  debug: true
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s
  max_header_bytes: 1048576

# ж—Ґеї—й…ЌзЅ®
logging:
  level: "info"
  format: "json"
  output: "stdout"
  file:
    enabled: false

# з›‘жЋ§й…ЌзЅ®
monitoring:
  enabled: false

# жњЌеЉЎжіЁе†ЊдёЋеЏ‘зЋ?registry:
  type: "static"

# д»Јзђ†й…ЌзЅ®
proxy:
  timeout: 30s
  idle_conn_timeout: 90s
  max_idle_conns: 100
  max_idle_conns_per_host: 10
  disable_keep_alives: false
  load_balancer: "round_robin"
  health_check:
    enabled: false

# е®‰е…Ёй…ЌзЅ®
security:
  # и®¤иЇЃй…ЌзЅ®
  auth:
    enabled: false
    skip_paths:
      - "/health"
      - "/ready"
      - "/metrics"
      - "/*"

  # й™ђжµЃй…ЌзЅ®
  rate_limit:
    enabled: false

  # CORSй…ЌзЅ®
  cors:
    allow_origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
      - "http://localhost:5174"
      - "http://localhost:8080"
      - "https://yourdomain.com"
    allow_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
      - "PATCH"
    allow_headers:
      - "Origin"
      - "Content-Type"
      - "Authorization"
      - "X-Requested-With"
      - "Accept"
      - "Cache-Control"
    expose_headers:
      - "Content-Length"
    allow_credentials: true
    max_age: 86400
    allow_all_origins: true

# жњЌеЉЎй…ЌзЅ®
services:
  # д»»еЉЎз®Ўзђ†жњЌеЉЎ
  - name: "task-management-service"
    url: "http://localhost:8084"
    load_balancer: "round_robin"
    health_check: "/health"
    timeout: 30
    routes:
      - path: "/tasks"
        method: "ANY"
        rewrite: "/api/v1/tasks"
        strip_prefix: false
      - path: "/tasks/*filepath"
        method: "ANY"
        rewrite: "/api/v1/tasks/*filepath"
        strip_prefix: false
      - path: "/projects"
        method: "ANY"
        rewrite: "/api/v1/projects"
        strip_prefix: false
      - path: "/projects/*filepath"
        method: "ANY"
        rewrite: "/api/v1/projects/*filepath"
        strip_prefix: false
      - path: "/teams"
        method: "ANY"
        rewrite: "/api/v1/teams"
        strip_prefix: false
      - path: "/teams/*filepath"
        method: "ANY"
        rewrite: "/api/v1/teams/*filepath"
        strip_prefix: false

  # з¤ѕеЊєжњЌеЉЎ
  - name: "community-service"
    url: "http://localhost:8085"
    load_balancer: "round_robin"
    health_check: "/health"
    timeout: 30
    routes:
      - path: "/posts"
        method: "ANY"
        rewrite: "/api/v1/posts"
        strip_prefix: false
      - path: "/posts/*filepath"
        method: "ANY"
        rewrite: "/api/v1/posts/*filepath"
        strip_prefix: false
      - path: "/post/*filepath"
        method: "ANY"
        rewrite: "/api/v1/post/*filepath"
        strip_prefix: false
      - path: "/comments"
        method: "ANY"
        rewrite: "/api/v1/comments"
        strip_prefix: false
      - path: "/comments/*filepath"
        method: "ANY"
        rewrite: "/api/v1/comments/*filepath"
        strip_prefix: false
      - path: "/comment/*filepath"
        method: "ANY"
        rewrite: "/api/v1/comment/*filepath"
        strip_prefix: false
      - path: "/users"
        method: "ANY"
        rewrite: "/api/v1/users"
        strip_prefix: false
      - path: "/users/*filepath"
        method: "ANY"
        rewrite: "/api/v1/users/*filepath"
        strip_prefix: false
      - path: "/chat"
        method: "ANY"
        rewrite: "/api/v1/chat"
        strip_prefix: false
      - path: "/chat/*filepath"
        method: "ANY"
        rewrite: "/api/v1/chat/*filepath"
        strip_prefix: false

  # AIй›†ж€ђжњЌеЉЎ
  - name: "ai-integration-service"
    url: "http://localhost:8083"
    load_balancer: "round_robin"
    health_check: "/health"
    timeout: 30
    routes:
      - path: "/ai"
        method: "ANY"
        rewrite: "/api/v1/ai"
        strip_prefix: false
      - path: "/ai/*filepath"
        method: "ANY"
        rewrite: "/api/v1/ai/*filepath"
        strip_prefix: false

# йќ™жЂЃи·Їз”±й…ЌзЅ?static_services:
  task-management-service:
    - id: "task-management-1"
      address: "localhost"
      port: 8084
      weight: 1
      tags: ["primary"]
      meta:
        version: "1.0.0"
        region: "local"
        health_check_path: "/health"
  community-service:
    - id: "community-1"
      address: "localhost"
      port: 8085
      weight: 1
      tags: ["primary"]
      meta:
        version: "1.0.0"
        region: "local"
        health_check_path: "/health"
  ai-integration-service:
    - id: "ai-integration-1"
      address: "localhost"
      port: 8083
      weight: 1
      tags: ["primary"]
      meta:
        version: "1.0.0"
        region: "local"
        health_check_path: "/health"

# еЃҐеє·жЈЂжџҐй…ЌзЅ?health_check:
  enabled: false

# жЂ§иѓЅй…ЌзЅ®
performance:
  connection_pool:
    max_idle_conns: 100
    max_idle_conns_per_host: 10
    idle_conn_timeout: 90s
    disable_keep_alives: false
  cache:
    enabled: false
  compression:
    enabled: true
    level: 6
    min_length: 1024

# ејЂеЏ‘й…ЌзЅ?development:
  hot_reload: true
  debug_headers: true
  mock_services: false
  profiling: false
